<div class="export-card">
  <h3>💾 Gestión de datos</h3>

  <div class="export-row">
    <div class="export-label">Importar tareas</div>
    <input type="file" id="importJsonInput" accept=".json"/>
  </div>

  <div class="export-row">
    <div class="export-label">Exportar JSON</div>
    <button id="exportJsonBtn" class="btn-primary">⬇️ Descargar</button>
  </div>

  <div class="export-row">
    <div class="export-label">Borrar todo</div>
    <button id="clearAllBtn" class="btn-primary" style="background:var(--danger)">🗑️ Borrar</button>
  </div>

  <pre id="dataStatus"></pre>
</div>
