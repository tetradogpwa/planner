
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Planificador Semanal Profesional</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <link rel="stylesheet" href="index.css">
  <meta name="theme-color" content="#6366f1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Planificador">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192x192.png">
</head>

<body>

<header class="topbar">
  <button class="hamburger" id="menuToggle" aria-label="Abrir menú" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
  <h1>📅 Planner</h1>
  <div class="topbar-spacer"></div>
</header>

<!-- Overlay para cerrar el menú en mobile -->
<div class="sidebar-overlay" id="sidebarOverlay"></div>

<div class="layout">
  <nav class="sidebar" id="sidebar" aria-label="Navegación principal">

    <div class="sidebar-nav">
      <button class="nav-item active" data-view="tasks">
        <span class="nav-icon">🧩</span>
        <span class="nav-label">Gestión tareas</span>
      </button>
      <button class="nav-item" data-view="week">
        <span class="nav-icon">📆</span>
        <span class="nav-label">Semana actual</span>
      </button>
      <button class="nav-item" data-view="allWeeks">
        <span class="nav-icon">📊</span>
        <span class="nav-label">Todas semanas</span>
      </button>

      <hr class="sidebar-divider"/>

      <button class="nav-item" data-view="data">
        <span class="nav-icon">💾</span>
        <span class="nav-label">Gestión datos</span>
      </button>
      <button class="nav-item" data-view="print">
        <span class="nav-icon">🖨️</span>
        <span class="nav-label">Imprimir / PDF</span>
      </button>
    </div>

    <!-- Botón de colapso (solo desktop) -->
    <button class="sidebar-collapse-btn" id="sidebarCollapseBtn" aria-label="Contraer menú">
      <span class="collapse-icon">◀</span>
      <span class="nav-label">Contraer</span>
    </button>

  </nav>

  <main class="content">
    <section id="view-tasks"    class="view active"></section>
    <section id="view-week"     class="view"></section>
    <section id="view-allWeeks" class="view"></section>
    <section id="view-data"     class="view"></section>
    <section id="view-print"    class="view"></section>
  </main>
</div>

<script type="module" src="./index.js"></script>
</body>
</html>
