<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Planner SPA</title>
  <link rel="stylesheet" href="./index.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
<header class="topbar">
  <h1>📅 Planner</h1>
</header>
<div class="layout">
  <nav class="sidebar">
    <button class="nav-item active" data-view="tasks">🧩 Gestión tareas</button>
    <button class="nav-item" data-view="week">📆 Semana actual</button>
    <button class="nav-item" data-view="allWeeks">📊 Todas semanas</button>
    <hr/>
    <button class="nav-item" data-view="data">💾 Gestión datos</button>
    <button class="nav-item" data-view="print">🖨️ Imprimir / PDF</button>
  </nav>
  <main class="content">
    <section id="view-tasks"    class="view active"></section>
    <section id="view-week"     class="view"></section>
    <section id="view-allWeeks" class="view"></section>
    <section id="view-data"     class="view"></section>
    <section id="view-print"    class="view"></section>
  </main>
</div>
<script type="module" src="./index.js"></script>
</body>
</html>
